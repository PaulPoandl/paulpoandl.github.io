<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - UniversityFlow</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--secondary-color);
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="header-logo">
                <img src="Bilder/UNIversityFLOW.png" alt="UniversityFlow Logo">
            </a>
            <nav aria-label="Hauptnavigation">
                <ul>
                    <li><a href="index.html">Startseite</a></li>
                    <li><a href="about.html">Über uns</a></li>
                    <li><a href="contact.html" aria-current="page">Kontakt</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h1 style="text-align: center;">Kontaktieren Sie uns</h1>
        <p style="text-align: center; margin-bottom: 2rem;">Haben Sie Fragen zu UniversityFlow? Schreiben Sie uns eine Nachricht!</p>
        
        <div class="contact-container">
            <form onsubmit="alert('Ihre Nachricht wurde erfolgreich gesendet!'); return false;">
                <div class="form-group">
                    <label for="name">Ihr Name</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Ihre E-Mail-Adresse</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label for="subject">Betreff</label>
                    <input type="text" id="subject" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Ihre Nachricht</label>
                    <textarea id="message" rows="5" required></textarea>
                </div>
                
                <button type="submit" class="button" style="width: 100%;">Nachricht senden</button>
            </form>
        </div>
    </main>

    <footer>
        <nav aria-label="Rechtliche Navigation">
            <a href="impressum.html">Impressum</a>
            <a href="privacy.html">Datenschutz</a>
            <a href="license.html">Lizenz</a>
            <a href="copyright.html">Urheberrecht</a>
            <a href="accessibility.html">Barrierefreiheit</a>
        </nav>
        <p>&copy; 2026 UniversityFlow Solutions GmbH</p>
    </footer>
</body>
</html>
